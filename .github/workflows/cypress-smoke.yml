name: Cypress Test Suites

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 12 * * *"   # 6:00 AM CST = 12:00 UTC
  workflow_dispatch:

jobs:
  regression-run:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress regression + generate HTML report
        run: npm run cy:run:regression && npm run report:merge && npm run report:html

      - name: Upload Mochawesome HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-mochawesome-html-report
          path: cypress/reports/html

      - name: Upload Mochawesome JSON + merged JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-mochawesome-json
          path: |
            cypress/reports/mochawesome
            cypress/reports/mochawesome-merged.json

      - name: Upload screenshots (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-cypress-screenshots
          path: cypress/reports/screenshots
          if-no-files-found: ignore

      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-cypress-videos
          path: cypress/reports/videos
          if-no-files-found: ignore

  smoke-run:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress smoke + generate HTML report
        run: npm run cy:run:smoke && npm run report:merge && npm run report:html

      - name: Upload Mochawesome HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-mochawesome-html-report
          path: cypress/reports/html

      - name: Upload Mochawesome JSON + merged JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-mochawesome-json
          path: |
            cypress/reports/mochawesome
            cypress/reports/mochawesome-merged.json

      - name: Upload screenshots (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-cypress-screenshots
          path: cypress/reports/screenshots
          if-no-files-found: ignore

      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-cypress-videos
          path: cypress/reports/videos
          if-no-files-found: ignore